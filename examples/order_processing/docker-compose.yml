name: durable-python-order-processing

x-server-env: &server-env
  APP_NAME: "Durable Workflow Server"
  APP_ENV: local
  APP_KEY: "base64:dGVzdGluZy1rZXktMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMg=="
  APP_DEBUG: "false"
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: durable_workflow
  DB_USERNAME: workflow
  DB_PASSWORD: workflow
  REDIS_HOST: redis
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  WORKFLOW_SERVER_AUTH_DRIVER: token
  WORKFLOW_SERVER_AUTH_TOKEN: "${WORKFLOW_SERVER_AUTH_TOKEN:-sample-token}"

services:
  bootstrap:
    image: "${SERVER_IMAGE:-durableworkflow/server:0.2.2}"
    command: ["server-bootstrap"]
    environment: *server-env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  server:
    image: "${SERVER_IMAGE:-durableworkflow/server:0.2.2}"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      <<: *server-env
      PHP_CLI_SERVER_WORKERS: "${PHP_CLI_SERVER_WORKERS:-8}"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  queue-worker:
    image: "${SERVER_IMAGE:-durableworkflow/server:0.2.2}"
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--max-time=3600"]
    environment: *server-env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  python-worker:
    build:
      context: ../..
      dockerfile: examples/order_processing/Dockerfile
    environment:
      SERVER_URL: "http://server:8080"
      WORKFLOW_TOKEN: "${WORKFLOW_SERVER_AUTH_TOKEN:-sample-token}"
      WORKFLOW_NAMESPACE: default
      TASK_QUEUE: orders-python
    depends_on:
      server:
        condition: service_healthy
      queue-worker:
        condition: service_started

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: durable_workflow
      MYSQL_USER: workflow
      MYSQL_PASSWORD: workflow
      MYSQL_ROOT_PASSWORD: root
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 2s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
