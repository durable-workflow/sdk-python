# Spins up a Durable Workflow server stack for integration tests.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --wait
#   DURABLE_WORKFLOW_SERVER_URL=http://localhost:8080 pytest tests/integration/ -v
#   docker compose -f docker-compose.test.yml down -v

services:
  bootstrap:
    build:
      context: ../server
      args:
        WORKFLOW_PACKAGE_SOURCE: ${WORKFLOW_PACKAGE_SOURCE:-https://github.com/durable-workflow/workflow.git}
        WORKFLOW_PACKAGE_REF: ${WORKFLOW_PACKAGE_REF:-v2}
    command: ["server-bootstrap"]
    environment: &server-env
      APP_NAME: "Durable Workflow Server"
      APP_ENV: testing
      APP_KEY: "base64:dGVzdGluZy1rZXktMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMg=="
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: durable_workflow
      DB_USERNAME: workflow
      DB_PASSWORD: workflow
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      WORKFLOW_SERVER_AUTH_DRIVER: token
      WORKFLOW_SERVER_AUTH_TOKEN: "test-token"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  server:
    build:
      context: ../server
      args:
        WORKFLOW_PACKAGE_SOURCE: ${WORKFLOW_PACKAGE_SOURCE:-https://github.com/durable-workflow/workflow.git}
        WORKFLOW_PACKAGE_REF: ${WORKFLOW_PACKAGE_REF:-v2}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment: *server-env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ../server
      args:
        WORKFLOW_PACKAGE_SOURCE: ${WORKFLOW_PACKAGE_SOURCE:-https://github.com/durable-workflow/workflow.git}
        WORKFLOW_PACKAGE_REF: ${WORKFLOW_PACKAGE_REF:-v2}
    command: php artisan queue:work --sleep=1 --tries=3 --max-time=3600
    environment: *server-env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: durable_workflow
      MYSQL_USER: workflow
      MYSQL_PASSWORD: workflow
      MYSQL_ROOT_PASSWORD: root
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
